blueprint:
  name: Zigbee2MQTT - H2 Quad Rocker Scene Controller
  description: >
    Control lights, fans, and blinds using the H2 Quad Rocker via Zigbee2MQTT.
    Top: Light Toggle
    Middle: Fan Cycle
    Bottom: Blind Up/Stop (Optional)
    Wireless: Blind Down/Stop (Optional)
  domain: automation

  input:
    z2m_action_topic:
      name: Zigbee2MQTT action topic
      description: e.g., zigbee2mqtt/Bedroom 3 Scene Control/action
      selector:
        text: {}

    light_entity:
      name: Light entity
      selector:
        entity:
          domain: light

    fan_entity:
      name: Fan entity
      selector:
        entity:
          domain: fan

    fan_low_pct:
      name: Fan Low percentage
      default: 33
      selector:
        number:
          min: 1
          max: 100
          step: 1
          mode: slider

    fan_med_pct:
      name: Fan Medium percentage
      default: 66
      selector:
        number:
          min: 1
          max: 100
          step: 1
          mode: slider

    fan_high_pct:
      name: Fan High percentage
      default: 100
      selector:
        number:
          min: 1
          max: 100
          step: 1
          mode: slider

    blind_entity:
      name: Blind/Cover entity (Optional)
      default: ""
      description: Leave blank if you don't have blinds yet.
      selector:
        entity:
          domain: cover

mode: parallel
max: 10

trigger:
  - platform: mqtt
    topic: !input z2m_action_topic

variables:
  blind_entity: !input blind_entity
  fan_entity: !input fan_entity
  low: !input fan_low_pct
  med: !input fan_med_pct
  high: !input fan_high_pct

action:
  - choose:
      # --- TOP ROCKER (Light) ---
      - conditions: "{{ trigger.payload == 'single_top' }}"
        sequence:
          - action: light.toggle
            target:
              entity_id: !input light_entity

      # --- CENTER ROCKER (Fan Cycle) ---
      - conditions: "{{ trigger.payload == 'single_center' }}"
        sequence:
          - variables:
              current: "{{ state_attr(fan_entity, 'percentage') | int(0) }}"
              next_pct: >-
                {% if current == 0 %}{{ low }}
                {% elif current <= low %}{{ med }}
                {% elif current <= med %}{{ high }}
                {% else %}0
                {% endif %}
          - if:
              - condition: template
                value_template: "{{ next_pct | int(0) == 0 }}"
            then:
              - action: fan.turn_off
                target:
                  entity_id: !input fan_entity
            else:
              - action: fan.turn_on
                target:
                  entity_id: !input fan_entity
                data:
                  percentage: "{{ next_pct | int }}"

      # --- BOTTOM ROCKER (Blind Up) ---
      - conditions:
          - "{{ trigger.payload == 'single_bottom' }}"
          - "{{ blind_entity != '' }}"
        sequence:
          - if:
              - condition: template
                value_template: "{{ is_state(blind_entity, 'opening') }}"
            then:
              - action: cover.stop_cover
                target:
                  entity_id: !input blind_entity
            else:
              - action: cover.open_cover
                target:
                  entity_id: !input blind_entity

      # --- WIRELESS ROCKER (Blind Down) ---
      - conditions:
          - "{{ trigger.payload == 'single_wireless' }}"
          - "{{ blind_entity != '' }}"
        sequence:
          - if:
              - condition: template
                value_template: "{{ is_state(blind_entity, 'closing') }}"
            then:
              - action: cover.stop_cover
                target:
                  entity_id: !input blind_entity
            else:
              - action: cover.close_cover
                target:
                  entity_id: !input blind_entity
