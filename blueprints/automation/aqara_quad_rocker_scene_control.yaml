blueprint:
  name: Zigbee2MQTT - H2 Quad Rocker Scene Controller
  description: >
    Control lights, fans, and blinds using the H2 Quad Rocker via Zigbee2MQTT.
    Top: Light Toggle
    Middle: Fan Cycle
    Bottom: Blind Up/Stop (Optional)
    Wireless: Blind Down/Stop (Optional)
  domain: automation
  input:
    z2m_action_topic:
      name: Zigbee2MQTT action topic
      selector:
        text: {}
    light_entity:
      name: Light entity
      selector:
        target:
          entity:
            domain: light
    fan_entity:
      name: Fan entity
      selector:
        target:
          entity:
            domain: fan
    fan_low_pct:
      name: Fan Low percentage
      default: 33
      selector:
        number:
          min: 1
          max: 100
          step: 1
    fan_med_pct:
      name: Fan Medium percentage
      default: 66
      selector:
        number:
          min: 1
          max: 100
          step: 1
    fan_high_pct:
      name: Fan High percentage
      default: 100
      selector:
        number:
          min: 1
          max: 100
          step: 1
    blind_entity:
      name: Blind/Cover entity (Optional)
      default:
      selector:
        target:
          entity:
            domain: cover

mode: parallel
max: 10

trigger:
  - platform: mqtt
    topic: !input z2m_action_topic

variables:
  blind_target: !input blind_entity
  # Check if a blind was actually selected
  blind_exists: "{{ blind_target is not none and blind_target != {} and blind_target != [] }}"
  low: !input fan_low_pct
  med: !input fan_med_pct
  high: !input fan_high_pct

action:
  - choose:
      # --- TOP ROCKER (Light) ---
      - conditions: "{{ trigger.payload == 'single_top' }}"
        sequence:
          - action: light.toggle
            target: !input light_entity

      # --- CENTER ROCKER (Fan Cycle) ---
      - conditions: "{{ trigger.payload == 'single_center' }}"
        sequence:
          - variables:
              fan_input: !input fan_entity
              # Extract entity_id even if it's wrapped in a target dictionary
              fan_id: >
                {% if fan_input.entity_id is defined %}
                  {{ fan_input.entity_id }}
                {% else %}
                  {{ fan_input }}
                {% endif %}
              current: "{{ state_attr(fan_id, 'percentage') | int(0) }}"
          - action: fan.turn_on
            target: !input fan_entity
            data:
              percentage: >
                {% if current == 0 %} {{ low }}
                {% elif current <= low %} {{ med }}
                {% elif current <= med %} {{ high }}
                {% else %} 0
                {% endif %}

      # --- BOTTOM ROCKER (Blind Up) ---
      - conditions: 
          - "{{ trigger.payload == 'single_bottom' }}"
          - "{{ blind_exists }}"
        sequence:
          - if:
              - condition: template
                # Use device_id or entity_id from the target for the state check
                value_template: >
                  {% set b_id = blind_target.entity_id if blind_target.entity_id is defined else blind_target %}
                  {{ is_state(b_id, 'opening') }}
            then:
              - action: cover.stop_cover
                target: !input blind_entity
            else:
              - action: cover.open_cover
                target: !input blind_entity

      # --- WIRELESS ROCKER (Blind Down) ---
      - conditions: 
          - "{{ trigger.payload == 'single_wireless' }}"
          - "{{ blind_exists }}"
        sequence:
          - if:
              - condition: template
                value_template: >
                  {% set b_id = blind_target.entity_id if blind_target.entity_id is defined else blind_target %}
                  {{ is_state(b_id, 'closing') }}
            then:
              - action: cover.stop_cover
                target: !input blind_entity
            else:
              - action: cover.close_cover
                target: !input blind_entity
