blueprint:
  name: Zigbee2MQTT - 4 Button Remote for Light, Fan Toggle, and Blinds
  description: >
    Button 1: single = light toggle, double = cycle brightness presets (dim/med/bright)
    Button 2: single = fan toggle, double = cycle fan speeds low/med/high
    Button 3: single = blind open / stop
    Button 4: single = blind close / stop
    Hold actions are ignored.

    Blind logic:
    - First press opens or closes
    - Second press within the stop window while mid-travel sends STOP
    - Pressing again later resumes movement instead of endlessly alternating
  domain: automation

  input:
    z2m_action_topic:
      name: Zigbee2MQTT action topic
      description: e.g. zigbee2mqtt/Master Remote/action
      selector:
        text: {}

    light_entity:
      name: Light entity
      selector:
        entity:
          domain: light

    light_dim_pct:
      name: Light Dim brightness
      default: 25
      selector:
        number:
          min: 1
          max: 100
          step: 1
          mode: slider

    light_med_pct:
      name: Light Medium brightness
      default: 60
      selector:
        number:
          min: 1
          max: 100
          step: 1
          mode: slider

    light_bright_pct:
      name: Light Bright brightness
      default: 100
      selector:
        number:
          min: 1
          max: 100
          step: 1
          mode: slider

    fan_entity:
      name: Fan entity
      selector:
        entity:
          domain: fan

    fan_low_pct:
      name: Fan Low percentage
      default: 33
      selector:
        number:
          min: 1
          max: 100
          step: 1
          mode: slider

    fan_med_pct:
      name: Fan Medium percentage
      default: 66
      selector:
        number:
          min: 1
          max: 100
          step: 1
          mode: slider

    fan_high_pct:
      name: Fan High percentage
      default: 100
      selector:
        number:
          min: 1
          max: 100
          step: 1
          mode: slider

    blind_entity:
      name: Blind/Cover entity (Optional)
      default: ""
      description: Leave blank if this remote is not controlling blinds.
      selector:
        entity:
          domain: cover

    blind_stop_window_secs:
      name: Blind stop window (seconds)
      description: >
        If the blind is between 0 and 100 and was updated within this many
        seconds, pressing the same blind button again sends STOP.
      default: 2
      selector:
        number:
          min: 1
          max: 10
          step: 1
          mode: slider

mode: parallel
max: 10

trigger:
  - platform: mqtt
    topic: !input z2m_action_topic

variables:
  light: !input light_entity
  fan: !input fan_entity
  blind_entity: !input blind_entity
  low: !input fan_low_pct
  med: !input fan_med_pct
  high: !input fan_high_pct
  light_dim: !input light_dim_pct
  light_med: !input light_med_pct
  light_bright: !input light_bright_pct
  blind_stop_window_secs: !input blind_stop_window_secs

action:
  - choose:
      # --- BUTTON 1: LIGHT TOGGLE ---
      - conditions:
          - condition: template
            value_template: "{{ trigger.payload == '1_single' }}"
        sequence:
          - action: light.toggle
            target:
              entity_id: !input light_entity

      # --- BUTTON 1 DOUBLE: LIGHT BRIGHTNESS CYCLE DIM -> MED -> BRIGHT -> DIM ---
      - conditions:
          - condition: template
            value_template: "{{ trigger.payload == '1_double' }}"
        sequence:
          - variables:
              current_bri: "{{ state_attr(light, 'brightness') | int(0) | multiply(100) | divide(255) | int(0) }}"
              next_bri: >-
                {% if is_state(light, 'off') or current_bri == 0 %}
                  {{ light_dim }}
                {% elif current_bri <= light_dim %}
                  {{ light_med }}
                {% elif current_bri <= light_med %}
                  {{ light_bright }}
                {% else %}
                  {{ light_dim }}
                {% endif %}
          - action: light.turn_on
            target:
              entity_id: !input light_entity
            data:
              brightness_pct: "{{ next_bri | int }}"

      # --- BUTTON 2: FAN TOGGLE ---
      - conditions:
          - condition: template
            value_template: "{{ trigger.payload == '2_single' }}"
        sequence:
          - action: fan.toggle
            target:
              entity_id: !input fan_entity

      # --- BUTTON 2 DOUBLE: FAN SPEED CYCLE LOW -> MED -> HIGH -> LOW ---
      - conditions:
          - condition: template
            value_template: "{{ trigger.payload == '2_double' }}"
        sequence:
          - variables:
              current_pct: "{{ state_attr(fan, 'percentage') | int(0) }}"
              next_pct: >-
                {% if is_state(fan, 'off') or current_pct == 0 %}
                  {{ low }}
                {% elif current_pct <= low %}
                  {{ med }}
                {% elif current_pct <= med %}
                  {{ high }}
                {% else %}
                  {{ low }}
                {% endif %}
          - action: fan.turn_on
            target:
              entity_id: !input fan_entity
            data:
              percentage: "{{ next_pct | int }}"

      # --- BUTTON 3: BLIND OPEN / STOP ---
      - conditions:
          - condition: template
            value_template: "{{ trigger.payload == '3_single' }}"
          - condition: template
            value_template: "{{ blind_entity != '' }}"
        sequence:
          - variables:
              blind_pos: "{{ state_attr(blind_entity, 'current_position') | int(-1) }}"
              blind_age_secs: >-
                {{ (as_timestamp(now()) - as_timestamp(states[blind_entity].last_updated, 0)) | float(999) }}
              blind_recent: "{{ blind_age_secs <= (blind_stop_window_secs | int(2)) }}"
              blind_mid_travel: "{{ blind_pos > 0 and blind_pos < 100 }}"
          - choose:
              - conditions:
                  - condition: template
                    value_template: "{{ blind_mid_travel and blind_recent }}"
                sequence:
                  - action: cover.stop_cover
                    target:
                      entity_id: !input blind_entity

              - conditions:
                  - condition: template
                    value_template: "{{ blind_pos == -1 or blind_pos < 100 }}"
                sequence:
                  - action: cover.open_cover
                    target:
                      entity_id: !input blind_entity

      # --- BUTTON 4: BLIND CLOSE / STOP ---
      - conditions:
          - condition: template
            value_template: "{{ trigger.payload == '4_single' }}"
          - condition: template
            value_template: "{{ blind_entity != '' }}"
        sequence:
          - variables:
              blind_pos: "{{ state_attr(blind_entity, 'current_position') | int(-1) }}"
              blind_age_secs: >-
                {{ (as_timestamp(now()) - as_timestamp(states[blind_entity].last_updated, 0)) | float(999) }}
              blind_recent: "{{ blind_age_secs <= (blind_stop_window_secs | int(2)) }}"
              blind_mid_travel: "{{ blind_pos > 0 and blind_pos < 100 }}"
          - choose:
              - conditions:
                  - condition: template
                    value_template: "{{ blind_mid_travel and blind_recent }}"
                sequence:
                  - action: cover.stop_cover
                    target:
                      entity_id: !input blind_entity

              - conditions:
                  - condition: template
                    value_template: "{{ blind_pos == -1 or blind_pos > 0 }}"
                sequence:
                  - action: cover.close_cover
                    target:
                      entity_id: !input blind_entity
